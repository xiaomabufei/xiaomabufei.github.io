name: Update Google Scholar citations

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        run: python -m pip install requests beautifulsoup4

      - name: Fetch citation count
        run: python scripts/update_scholar.py

      - name: Commit updated citation count
        run: |
          if git diff --quiet -- index.html; then
            echo "Citation count is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update Google Scholar citations"
          git push
